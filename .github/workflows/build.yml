name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build ARM64 (native)
        run: swift build -c release

      - name: Copy ARM64 binary
        run: cp .build/release/SteamGuardMac /tmp/SteamGuardMac-arm64

      - name: Build x86_64 (cross-compile)
        run: swift build -c release --triple x86_64-apple-macosx13

      - name: Find x86_64 binary
        run: |
          X86_BIN=$(find .build -name SteamGuardMac -path "*/x86_64*" -not -path "*.dSYM*" -type f | head -1)
          echo "Found: $X86_BIN"
          cp "$X86_BIN" /tmp/SteamGuardMac-x86_64

      - name: Verify architectures
        run: |
          file /tmp/SteamGuardMac-arm64
          file /tmp/SteamGuardMac-x86_64

      - name: Create Universal Binary
        run: lipo -create /tmp/SteamGuardMac-arm64 /tmp/SteamGuardMac-x86_64 -output SteamGuardMac-universal

      - name: Verify Universal Binary
        run: lipo -info SteamGuardMac-universal

      - name: Package App Bundle
        run: |
          mkdir -p "Steam Mac Authenticator.app/Contents/MacOS"
          mkdir -p "Steam Mac Authenticator.app/Contents/Resources"
          cp SteamGuardMac-universal "Steam Mac Authenticator.app/Contents/MacOS/SteamGuardMac"
          cp SteamGuardMac.app/Contents/Info.plist "Steam Mac Authenticator.app/Contents/Info.plist"
          cp AppIcon.icns "Steam Mac Authenticator.app/Contents/Resources/AppIcon.icns"

      - name: Create DMG
        run: |
          mkdir dmg_contents
          cp -r "Steam Mac Authenticator.app" dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create -volname "Steam Mac Authenticator" \
            -srcfolder dmg_contents -ov -format UDZO \
            SMA-${{ github.ref_name }}.dmg

      - name: Generate SHA256
        run: shasum -a 256 SMA-${{ github.ref_name }}.dmg | tee SHA256SUMS.txt

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SMA-${{ github.ref_name }}.dmg
            SHA256SUMS.txt
          body: |
            ## SMA ${{ github.ref_name }}

            **This DMG was built automatically by GitHub Actions from the source code in this repo.**
            No manual uploads. Verify the [build log](../../actions) yourself.

            ### Verify Download
            ```bash
            shasum -a 256 SMA-${{ github.ref_name }}.dmg
            ```
            Compare with `SHA256SUMS.txt` attached to this release.

            ### Build from source
            ```bash
            git clone https://github.com/P4tch0/SMA.git
            cd SMA
            swift build -c release
            ```
